# 3-finger swipe UP -> Open app launcher (Rofi)
gesture = 3, up, dispatcher, exec, sh -c "pkill -x rofi || rofi -show drun -theme ~/.config/rofi/launchers/type-3/style-1.rasi"

# Horizontal swipe -> Switch workspaces
gesture = 3, horizontal, workspace

# 3-finger swipe DOWN -> Toggle scratchpad
gesture = 3, down, special, magic

# 4-finger swipe UP -> Fullscreen
gesture = 4, up, fullscreen

# 4-finger swipe DOWN -> Swap with master
gesture = 4, down, dispatcher, exec, hyprctl dispatch layoutmsg swapwithmaster master

# Pinch OUT -> Close current window
gesture = 4, pinchout, close

# --- ZOOM GESTURES (macOS style) ---
gesture = 2, pinchin, dispatcher, exec, sh -c 'Z=$(hyprctl getoption cursor:zoom_factor | awk "/float:/ {print \$2}"); hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $Z + 0.5}")'
gesture = 2, pinchout, dispatcher, exec, sh -c 'Z=$(hyprctl getoption cursor:zoom_factor | awk "/float:/ {print \$2}"); hyprctl keyword cursor:zoom_factor $(awk "BEGIN {v=$Z - 0.5; print (v<1)?1:v}")'
