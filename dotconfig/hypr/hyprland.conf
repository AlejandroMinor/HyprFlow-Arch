# #######################################################################################
# Autogenerated HYPRLAND CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hyprland.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

# autogenerated = 1 # remove this line to remove the warning

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


disable_logs = false


###############################
### MONITORS AND WORKSPACES ###
###############################
exec-once = monitors.sh
#source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/vertical_monitors.conf


###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$fileManager = kitty --class yazi-kitty -e yazi
$menu = rofi -show drun -modes 'drun,window,run' -theme ~/.config/rofi/launchers/type-3/style-1.rasi
$browser = microsoft-edge-stable

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = waybar
exec-once = awww-daemon
exec-once = eww open activate-linux
exec-once = nm-applet --indicator
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = hyprpm reload -n
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland
env = MOZ_ENABLE_WAYLAND, 1
 
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,0
env = QT_QPA_PLATFORMTHEME, qt6ct
env = QT_QPA_PLATFORMTHEME_Qt5, qt5ct
env = GTK_THEME,Adwaita-dark
env = GTK_ICON_THEME,Adwaita
env = GTK_APPLICATION_PREFER_DARK_THEME,1

# Nvidia to more info see https://wiki.hypr.land/Nvidia/
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = ELECTRON_OZONE_PLATFORM_HINT,auto



#####################
### LOOK AND FEEL ###
#####################

### DYNAMIC COLORS 

source = $HOME/.cache/wallust/colors/colors-hyprland.conf

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 3
    gaps_out = 15

    border_size = 2

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = $active_border_main $active_border_fade $active_border_fade $active_border_main 45deg
    col.inactive_border = rgba(00000000)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = master #dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 12
    rounding_power = 8

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 0.80

    shadow {
        enabled = true
        range = 30
        render_power = 2
        color = rgba(0,0,0,0.6)
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 2
        passes = 2

        vibrancy = 0.1696
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
# ANIMATIONS
source = ~/.config/hypr/animations.conf

plugin {
    hyprfocus {
        enabled = yes
        # Modes: flash, bounce, or slide
        mode = slide
        # for flash
        fade_opacity = 0.99
        # for bounce
        bounce_strength = 0.99
        # for slide
        slide_height = 8
        # whether to only perform the animation when changing between monitors
        only_on_monitor_change = true
    }
    
    hymission {
        outer_padding_top = 92
        outer_padding_right = 32
        outer_padding_bottom = 32
        outer_padding_left = 32
        row_spacing = 32
        column_spacing = 32
        min_window_length = 120
        small_window_boost = 1.35
        max_preview_scale = 0.95
        min_slot_scale = 0.10
        layout_scale_weight = 1.0
        layout_space_weight = 0.10

        expand_selected_window = 1
        overview_focus_follows_mouse = 1
        multi_workspace_sort_recent_first = 1
        toggle_switch_mode = 1
        switch_toggle_auto_next = 1
        switch_release_key = Super_L
        gesture_invert_vertical = 0
        one_workspace_per_row = 0
        only_active_workspace = 0
        only_active_monitor = 0
        show_special = 0
        workspace_change_keeps_overview = 1

        workspace_strip_anchor = left
        workspace_strip_empty_mode = existing
        workspace_strip_thickness = 160
        workspace_strip_gap = 24
        hide_bar_when_strip = 1
        hide_bar_animation = 1
        hide_bar_animation_blur = 1
        hide_bar_animation_move_multiplier = 0.8
        hide_bar_animation_scale_divisor = 1.1
        hide_bar_animation_alpha_end = 0
        bar_single_mission_control = 0
        show_focus_indicator = 0

        debug_logs = 0
        debug_surface_logs = 0
    }
}


# Ref https://wiki.hyprland.org/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
workspace = w[tv1], gapsout:8 0 0 0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0

# See https://wiki.hypr.land/Configuring/Layouts/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Layouts/Master-Layout/for more
master {
    new_status = master
    mfact = 0.75
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(

    # For hyprwinwrap
    # vfr = 0                       # Disable variable frame rate (keeps background rendering active)
    # render_unfocused_fps = 60     # Keeps background terminal smooth even when focused elsewhere
    # always_follow_on_dnd = true
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = es
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
	disable_while_typing = true
	clickfinger_behavior = true

    }
}

source = ~/.config/hypr/gestures.conf


# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

device {
    name = logitech-mx-master-3s
    sensitivity = 0.3
}

device {
    name = apple-inc.-magic-trackpad
    sensitivity = 0.1
    accel_profile = adaptive
}


###################
### KEYBINDINGS ###
###################

source = ~/.config/hypr/keybindings.conf

#####################
### WINDOWS RULES ###
#####################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

# Example windowrule
# windowrule = float,class:^(kitty)$,title:^(kitty)$
source = ~/.config/hypr/windowrules.conf



group {
    col.border_active = $group_border_active $active_border_fade 45deg
    col.border_inactive = $inactive_border

    groupbar {
        enabled = true
        height = 1
        priority = 3
        
        col.active = rgba(7c3aedff)
        col.inactive = rgba(2d2d2d66)
        
        render_titles = true
        gradients = true
        text_color = rgba(ffffffff)
    }
}


layerrule {
    name = rofi-blur
    match:namespace = ^(rofi)$
    blur = on
}

layerrule {
    name = waybar-blur
    match:namespace = waybar
    blur = on
    ignore_alpha = 0.01
}




