# #######################################################################################
# Autogenerated HYPRLAND CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hyprland.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

# autogenerated = 1 # remove this line to remove the warning

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


disable_logs = false


###############################
### MONITORS AND WORKSPACES ###
###############################
exec-once = monitors.sh
#source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/vertical_monitors.conf


###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = warp-terminal
$fileManager = kitty --class float_kitty -e yazi
$menu = rofi -show drun -modes 'drun,window,run' -theme ~/.config/rofi/launchers/type-3/style-1.rasi
$browser = microsoft-edge-stable

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = waybar
exec-once = awww-daemon
exec-once = eww open activate-linux
exec-once = nm-applet --indicator
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = hyprpm reload -n
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland
env = MOZ_ENABLE_WAYLAND, 1
 
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,0
env = QT_QPA_PLATFORMTHEME, qt6ct
env = QT_QPA_PLATFORMTHEME_Qt5, qt5ct
env = GTK_THEME,Adwaita-dark
env = GTK_ICON_THEME,Adwaita
env = GTK_APPLICATION_PREFER_DARK_THEME,1

# Nvidia to more info see https://wiki.hypr.land/Nvidia/
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = ELECTRON_OZONE_PLATFORM_HINT,auto



#####################
### LOOK AND FEEL ###
#####################

### DYNAMIC COLORS 

source = $HOME/.cache/wallust/colors/colors-hyprland.conf

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 3
    gaps_out = 15

    border_size = 2

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = $active_border_main $active_border_fade $active_border_fade $active_border_main 45deg
    col.inactive_border = $inactive_border

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = master #dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 12
    rounding_power = 8

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 0.80

    shadow {
        enabled = true
        range = 30
        render_power = 2
        color = rgba(0,0,0,0.6)
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 2
        passes = 2

        vibrancy = 0.1696
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
# ANIMATIONS
source = ~/.config/hypr/animations.conf

plugin {
    hyprfocus {
        enabled = yes
        # Modes: flash, bounce, o slide
        mode = slide
        # for flash 
        fade_opacity = 0.99
        # for bounce
        bounce_strength = 0.99
        # for slide
        slide_height = 5
        # whether to only perform the animation when changing between monitors
        only_on_monitor_change = true
    }
}


# Ref https://wiki.hyprland.org/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
workspace = w[tv1], gapsout:8 0 0 0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
windowrule {
    name = smart-borders-tiled
    match:float = 0
    match:workspace = w[tv1]
    border_size = 0
    rounding = 0
}


windowrule {
    name = smart-borders-fullscreen
    match:float = 0
    match:workspace = f[1]
    border_size = 0
    rounding = 0
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
    mfact = 0.75
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(

    # Para hyprwinwrap
    # vfr = 0                       # Fuerza a desactivar el ahorro de energía
    # render_unfocused_fps = 60     # Mantiene el htop fluido aunque estés en otro monitor
    # always_follow_on_dnd = true
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = latam
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
	disable_while_typing = true
	clickfinger_behavior = true

    }
}

source = ~/.config/hypr/gestures.conf


# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

device {
    name = logitech-mx-master-3s
    sensitivity = 0.3
}

device {
    name = apple-inc.-magic-trackpad
    sensitivity = 0.1
    accel_profile = adaptive
}


###################
### KEYBINDINGS ###
###################

source = ~/.config/hypr/keybindings.conf

#####################
### WINDOWS RULES ###
#####################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

# Example windowrule
# windowrule = float,class:^(kitty)$,title:^(kitty)$

# Ignore maximize requests from apps. You'll probably like this.
windowrule {
    name = global-suppress-maximize
    match:class = .*
    suppress_event = maximize
}

# Fix some dragging issues with XWayland
windowrule {
    name = no-focus-xwayland-tooltips
    match:class = ^$
    match:title = ^$
    match:xwayland = 1
    match:float = 1
    match:fullscreen = 0
    match:pin = 0
    no_focus = on
}

# Solo afecta a ventanas secundarias (flotantes) de VS Code
windowrule {
    name = center-vscode-dialogs
    match:class = ^(Code|code-url-handler)$
    match:fullscreen = 0
    center = on
}

# Solo afecta a ventanas secundarias (flotantes) de Rofi
windowrule {
    name = center-rofi
    match:class = ^(Rofi|rofi)$
    match:fullscreen = 0
    center = on
}

windowrule {
    name = background-terminal
    match:class = kitty-bg
    monitor = DVI-I-1
    float = on
    pin = on
    
    # PERFORMANCE
    no_focus = on
    no_initial_focus = on
    border_size = 0
    #noshadow = on
    opacity = 1.0 override 1.0 override
}

group {
    col.border_active = $group_border_active $active_border_fade 45deg
    col.border_inactive = $inactive_border

    groupbar {
        enabled = true
        height = 1
        priority = 3
        
        col.active = rgba(7c3aedff)
        col.inactive = rgba(2d2d2d66)
        
        render_titles = true
        gradients = true
        text_color = rgba(ffffffff)
    }
}


layerrule {
    name = rofi-blur
    match:namespace = ^(rofi)$
    blur = on
}

layerrule {
    name = waybar-blur
    match:namespace = waybar
    blur = on
    ignore_alpha = 0.01
}


windowrule {
    name = waypaper-minimal
    match:class = ^(waypaper)$
    float = on
    size = 700 400
    center = on
}


windowrule {
    name = spotify-mini
    match:class = ^(Spotify)$
    float = on
    size = 900 600
    center = on
}


windowrule {
    name = audio-sink-switcher
    match:class = ^(kitty-sinkswitch)$
    float = on
    size = 450 150
    move = 1950 60 # change this to your monitor coordinates
    pin = on
    animation = slide
}

windowrule {
    name = cal-popup
    match:class = ^(cal-popup)$
    float = on
    size = 200 200
    move = 2220 60 # change this to your monitor coordinates
    pin = on
    animation = slide
}

windowrule {
    name = kitty-transparent
    match:class = ^(kitty)$
    opacity = 0.8 override 0.8 override
}

