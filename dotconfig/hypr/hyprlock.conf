$font = JetBrainsMono Nerd Font

general {
    hide_cursor = false
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
}

input-field {
    monitor =
    size = 320, 60
    outline_thickness = 3
    inner_color = rgba(20, 12, 28, 0.6)

    outer_color = rgba(255, 46, 136, 0.9) rgba(77, 216, 230, 0.9) 45deg
    check_color = rgba(77, 216, 230, 0.9)
    fail_color = rgba(255, 46, 136, 0.9)

    font_color = rgb(242, 233, 244)
    fade_on_empty = false
    rounding = 14

    font_family = $font
    placeholder_text = <span foreground="##9B8FA6" font_size="10pt">Type to unlock</span>
    fail_text = $PAMFAIL

    dots_spacing = 0.3

    position = 0, -60
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    font_size = 90
    font_family = $font
    color = rgb(242, 233, 244)

    position = 0, 40
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    font_size = 22
    font_family = $font
    color = rgb(155, 143, 166)

    position = 0, -60
    halign = center
    valign = top
}
