# Colours come from wallust; coordinates and backgrounds from geometry.sh,
# which rescales the layout to whatever display is attached.

source = ~/.config/hypr/hyprlock-theme.conf
source = ~/.config/hypr/hyprlock-geometry.conf

$font = JetBrainsMono Nerd Font

# Sourced here so the generated backgrounds are declared before what draws
# over them.
source = ~/.config/hypr/hyprlock-extras.conf

general {
    hide_cursor = true
    ignore_empty_input = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

label {
    monitor = $primary
    text = cmd[update:1000] date +"%H:%M"
    font_family = $font ExtraBold
    font_size = $clock_size
    color = $fg
    shadow_passes = $clock_shadow_passes
    shadow_size = $clock_shadow_size
    position = $clock_x, $clock_y
    halign = left
    valign = bottom
}

label {
    monitor = $primary
    text = cmd[update:60000] date +"%A %d · %B" | sed 's/.*/\U&/'
    font_family = $font
    font_size = $date_size
    color = $fg_dim
    position = $date_x, $date_y
    halign = left
    valign = bottom
}

# Frosted glass is faked with a translucent tint plus a light border; hyprlock
# cannot blur what is behind a shape.
shape {
    monitor = $primary
    size = $bar_w, $bar_h
    color = $surface
    rounding = $bar_r
    border_size = 1
    border_color = $border
    position = $bar_x, $bar_y
    halign = left
    valign = bottom
}

image {
    monitor = $primary
    path = $avatar
    size = $avatar_size
    rounding = -1
    border_size = 2
    border_color = $fg
    position = $avatar_x, $avatar_y
    halign = left
    valign = bottom
}

label {
    monitor = $primary
    text = $USER
    font_family = $font
    font_size = $user_size
    color = $fg
    position = $user_x, $user_y
    halign = left
    valign = bottom
}

input-field {
    monitor = $primary
    size = $input_w, $input_h
    position = $input_x, $input_y
    halign = left
    valign = bottom
    outline_thickness = 1
    rounding = $input_r
    inner_color = $input_bg
    outer_color = $input_border
    check_color = $accent
    fail_color = $error
    font_color = $fg
    font_family = $font
    dots_size = 0.25
    dots_spacing = 0.35
    # Defaults to true, which fades the field out while empty and makes it look
    # like it is not accepting input at all.
    fade_on_empty = false
    placeholder_text = <span alpha="55%">Type to unlock</span>
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
    hide_input = false
}

# Blank unless the layout is not the default one.
label {
    monitor = $primary
    text = cmd[update:2000] ~/.config/hypr/hyprlock/layout.sh
    font_family = $font
    font_size = $hud_size
    color = $accent
    position = $layout_x, $hud_y
    halign = right
    valign = bottom
}

# Read-only: hyprlock has no pointer interaction, so the media keys drive
# playback via the 'locked = true' binds in keybindings.lua.
image {
    monitor = $primary
    path = $lockart
    size = $art_size
    rounding = $art_r
    border_size = 0
    reload_time = 2
    reload_cmd = ~/.config/hypr/hyprlock/music.sh --art
    # No transition between covers: crossfade_time exists on background but is
    # ignored here, and the animation tree has no node for image reloads.
    position = $art_x, $art_y
    halign = right
    valign = bottom
}

label {
    monitor = $primary
    text = cmd[update:5000] ~/.config/hypr/hyprlock/music.sh --title
    font_family = $font
    font_size = $title_size
    color = $fg
    position = $music_x, $title_y
    halign = right
    valign = bottom
}

label {
    monitor = $primary
    text = cmd[update:5000] ~/.config/hypr/hyprlock/music.sh --subtitle
    font_family = $font
    font_size = $subtitle_size
    color = $fg_dim
    position = $music_x, $subtitle_y
    halign = right
    valign = bottom
}
