# -----------------------------------------------------
#  KEYBINDINGS
# -----------------------------------------------------
$mainMod = SUPER

# --- SYSTEM & HELP ---
bindd = $mainMod, X, Mission Control (Hymission), exec, hyprctl dispatch hymission:toggle
bindd = $mainMod, I,   View Keybind Guide, exec, ~/.local/bin/help-binds.sh
bindd = $mainMod, T, Open Terminal (Kitty), exec, kitty
bindd = $mainMod SHIFT, T, Open Floating Kitty, exec, [float; size 900 600; center] kitty
bindd = $mainMod, D, Open App Launcher, exec, sh -c "pkill -x rofi || $menu"
bindd = $mainMod, E, Open File Manager, exec, $fileManager
bindd = $mainMod SHIFT, E, Open Floating File Manager, exec, [float; size 1000 700; center] $fileManager
bindd = $mainMod, Q, Close Active Window, killactive,

# --- WINDOW MANAGEMENT ---
bindd = $mainMod, V, Toggle Float/Tile, togglefloating,
bindd = $mainMod, P, Pin Window (all workspaces), pin,
bindd = $mainMod, F, Fullscreen, fullscreen, 1
bindd = $mainMod SHIFT, F, Fullscreen (Absolute), fullscreen, 0
bindd = $mainMod, C, Center Floating Window, centerwindow,
bindd = $mainMod, O, Toggle Opacity, setprop, active opaque toggle
bindd = $mainMod SHIFT, C, Mini Window (1200x800), exec, sh -c "hyprctl dispatch setfloating && hyprctl dispatch resizeactive exact 1200 800 && hyprctl dispatch centerwindow"

# --- GROUPS (Browser Mode) ---
# 1. Group/Ungroup (Toggle)
bindd = $mainMod, G, Toggle Group, togglegroup
bindd = $mainMod SHIFT, G, Group All Windows in Workspace, exec, ~/.local/bin/hyprland-group-all.sh

# 2. Tab navigation
bindd = ALT, Tab, Next Tab, changegroupactive, f
bindd = ALT SHIFT, Tab, Previous Tab, changegroupactive, b

# 3. Move window into group
bind = $mainMod ALT, H, moveintogroup, l
bind = $mainMod ALT, L, moveintogroup, r
bind = $mainMod ALT, K, moveintogroup, u
bind = $mainMod ALT, J, moveintogroup, d

# 4. Move window out of group
bind = $mainMod ALT, down, moveoutofgroup

# --- LAYOUTS ---
#bindd = $mainMod, U, Pseudo Mode (Dwindle), pseudo,
#bindd = $mainMod, S, Toggle Split, layoutmsg, togglesplit

# --- SCRATCHPAD ---
bindd = $mainMod, Z, Toggle Scratchpad, togglespecialworkspace, magic
bindd = $mainMod SHIFT, Z, Send to Scratchpad, movetoworkspace, special:magic

# --- EXTRAS ---
bindd = $mainMod SHIFT, S, Screenshot, submap, screenshot

submap = screenshot
# --- with satty (annotate/save/copy)
bindd = , r, Region Screenshot (Satty), exec, sh -c "hyprctl dispatch submap reset && hyprshot -m region --freeze --raw | satty --copy-command wl-copy --early-exit --action-on-enter save-to-file --right-click-copy --filename - --output-filename $HOME/Pictures/Screenshots/$(date '+%Y-%m-%d_%H-%M-%S').png"
bindd = , w, Window Screenshot (Satty), exec, sh -c "hyprctl dispatch submap reset && hyprshot -m window --freeze --raw | satty --copy-command wl-copy --early-exit --action-on-enter save-to-file --right-click-copy --filename - --output-filename $HOME/Pictures/Screenshots/$(date '+%Y-%m-%d_%H-%M-%S').png"
bindd = , s, Screen Screenshot (Satty), exec, sh -c "hyprctl dispatch submap reset && hyprshot -m output --freeze --raw | satty --copy-command wl-copy --early-exit --action-on-enter save-to-file --right-click-copy --filename - --output-filename $HOME/Pictures/Screenshots/$(date '+%Y-%m-%d_%H-%M-%S').png"
# --- direct to clipboard
bindd = SHIFT, r, Region Screenshot → Clipboard, exec, sh -c "hyprctl dispatch submap reset; hyprshot -m region --freeze --clipboard-only"
bindd = SHIFT, w, Window Screenshot → Clipboard, exec, sh -c "hyprctl dispatch submap reset; hyprshot -m window --clipboard-only"
bindd = SHIFT, s, Screen Screenshot → Clipboard, exec, sh -c "hyprctl dispatch submap reset; hyprshot -m output --clipboard-only"
bind = , escape, submap, reset
submap = reset

bindd = $mainMod, N, Notifications, exec, swaync-client -t
bindd = $mainMod SHIFT, N, Clear Notifications, exec, swaync-client -C
bindd = $mainMod, B, Restart Waybar, exec, killall -SIGUSR1 waybar
bindd = $mainMod, A, Bring to Front, exec, hyprctl dispatch bringactivetotop

# =======================================================
#  MOVEMENT ZONE
# =======================================================

# --- FOCUS ---
bind = $mainMod, Tab, cyclenext
bind = $mainMod SHIFT, Tab, cyclenext, prev
bind = $mainMod, Escape, focuscurrentorlast

# Arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
# Vim (HJKL)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# --- MOVE WINDOWS (Swap) ---
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# --- FINE MOVEMENT (Floating windows) ---
binde = $mainMod CTRL, left, moveactive, -50 0
binde = $mainMod CTRL, right, moveactive, 50 0
binde = $mainMod CTRL, up, moveactive, 0 -50
binde = $mainMod CTRL, down, moveactive, 0 50
binde = $mainMod CTRL, h, moveactive, -50 0
binde = $mainMod CTRL, l, moveactive, 50 0
binde = $mainMod CTRL, k, moveactive, 0 -50
binde = $mainMod CTRL, j, moveactive, 0 50

# --- WINCTL (Window Control Submap) ---
bind = $mainMod, R, submap, winctl
submap = winctl
binde = , right, resizeactive, 10 0
binde = , left, resizeactive, -10 0
binde = , up, resizeactive, 0 -10
binde = , down, resizeactive, 0 10
binde = , h, resizeactive, -10 0
binde = , l, resizeactive, 10 0
binde = , k, resizeactive, 0 -10
binde = , j, resizeactive, 0 10
binde = SHIFT, right, moveactive, 50 0
binde = SHIFT, left, moveactive, -50 0
binde = SHIFT, up, moveactive, 0 -50
binde = SHIFT, down, moveactive, 0 50
binde = SHIFT, h, moveactive, -50 0
binde = SHIFT, l, moveactive, 50 0
binde = SHIFT, k, moveactive, 0 -50
binde = SHIFT, j, moveactive, 0 50
# --- Float presets (number keys) ---
bind = , 1, exec, hyprctl --batch "dispatch resizeactive exact 720 460"
bind = , 2, exec, hyprctl --batch "dispatch resizeactive exact 1100 700"
bind = , 3, exec, hyprctl --batch "dispatch resizeactive exact 1560 950"
bind = , 4, exec, hyprctl --batch "dispatch resizeactive exact 2000 1180"
# --- Master mfact presets (SHIFT + number, tiled windows only) ---
bind = SHIFT, 1, exec, hyprctl -j activewindow | grep -q '"floating": true' && notify-send "Resize" "mfact only applies to tiled windows" || hyprctl --batch "dispatch layoutmsg mfact -2 ; dispatch layoutmsg mfact 0.50"
bind = SHIFT, 2, exec, hyprctl -j activewindow | grep -q '"floating": true' && notify-send "Resize" "mfact only applies to tiled windows" || hyprctl --batch "dispatch layoutmsg mfact -2 ; dispatch layoutmsg mfact 0.65"
bind = SHIFT, 3, exec, hyprctl -j activewindow | grep -q '"floating": true' && notify-send "Resize" "mfact only applies to tiled windows" || hyprctl --batch "dispatch layoutmsg mfact -2 ; dispatch layoutmsg mfact 0.75"
bind = SHIFT, 4, exec, hyprctl -j activewindow | grep -q '"floating": true' && notify-send "Resize" "mfact only applies to tiled windows" || hyprctl --batch "dispatch layoutmsg mfact -2 ; dispatch layoutmsg mfact 0.85"
bind = , f, fullscreen, 1
bind = SHIFT, f, fullscreen, 0
bind = , c, centerwindow,
bind = , escape, submap, reset
submap = reset

# --- WORKSPACES ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


# --- MEDIA & HARDWARE ---
# Volume
binded = , XF86AudioRaiseVolume, Volume Up, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
binded = , XF86AudioLowerVolume, Volume Down, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
binded = , XF86AudioMute, Mute Audio, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
binded = , XF86AudioMicMute, Mute Microphone, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
binded = , XF86MonBrightnessUp, Brightness Up, exec, brightnessctl s 10%+
binded = , XF86MonBrightnessDown, Brightness Down, exec, brightnessctl s 10%-

# Playback
bindld = , XF86AudioNext, Next Track, exec, playerctl next
bindld = , XF86AudioPause, Pause, exec, playerctl play-pause
bindld = , XF86AudioPlay, Play, exec, playerctl play-pause
bindld = , XF86AudioPrev, Previous Track, exec, playerctl previous

# --- MEDIA CONTROL (MX Keys alternative) ---
bindld = $mainMod, period, Next Track (Keyboard), exec, playerctl next
bindld = $mainMod, comma, Previous Track (Keyboard), exec, playerctl previous

# Seek current track (10 seconds)
bindld = $mainMod SHIFT, period, Seek Forward 10s, exec, playerctl position 10+
bindld = $mainMod SHIFT, comma, Seek Back 10s, exec, playerctl position 10-


# --- ZOOM ---
# Increase zoom (0.5 keyboard, 0.1 mouse/trackpad)
binde = $mainMod SHIFT, I, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') + 0.5}")
binde = $mainMod SHIFT, mouse_down, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') + 0.1}")

binde = $mainMod SHIFT, O, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {v=$(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') - 0.5; print (v < 1) ? 1 : v}")
binde = $mainMod SHIFT, mouse_up, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {v=$(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') - 0.1; print (v < 1) ? 1 : v}")


# --- MASTER LAYOUT ---
bindd = $mainMod, Return, Swap with Master, layoutmsg, swapwithmaster master
bind = , mouse:277, layoutmsg, swapwithmaster master
bindd = $mainMod, S, Focus Master, layoutmsg, focusmaster auto
bindd = $mainMod, U, Rotate Master, layoutmsg, orientationnext
bindd = $mainMod, Y, Add to Master, layoutmsg, addmaster
bindd = $mainMod SHIFT, Y, Remove from Master, layoutmsg, removemaster

# --- SESSION & LAYOUT MANAGEMENT ---
bindd = $mainMod, M, Save & Exit, exec, ~/.local/bin/session-manager/save.sh logout
bindd = $mainMod, W, Save Layout Template, exec, ~/.local/bin/session-manager/save.sh custom
bindd = $mainMod SHIFT, W, Load Layout, exec, ~/.local/bin/session-manager/load.sh
bindd = $mainMod SHIFT, M, Force Exit, exit,
