# -----------------------------------------------------
#  CONFIGURACIÓN DE ATAJOS 
# -----------------------------------------------------
$mainMod = SUPER

# --- SISTEMA Y AYUDA ---
bindd = $mainMod, I,   Ver Guía de Atajos, exec, ~/HyprFlow-Arch/bin/help-binds.sh
bindd = $mainMod, T, Abrir Terminal, exec, $terminal
bindd = $mainMod SHIFT, T, Abrir terminal ligera (Kitty), exec, kitty
bindd = $mainMod, D, Abrir Menú de Apps, exec, sh -c "pkill -x rofi || $menu"
bindd = $mainMod, E, Abrir Archivos, exec, $fileManager
bindd = $mainMod SHIFT, E, Abrir Gestor Flotante, exec, [float; size 1000 700; center] $fileManager
bindd = $mainMod, Q, Cerrar Ventana Activa, killactive,

# --- GESTIÓN DE VENTANAS ---
bindd = $mainMod, V, Flotar/Anclar Ventana, togglefloating,
bindd = $mainMod, P, Pin (Anclar en todos los WS), pin,
bindd = $mainMod, F, Pantalla Completa, fullscreen, 1
bindd = $mainMod SHIFT, F, Pantalla Completa (Absoluta), fullscreen, 0
bindd = $mainMod, C, Centrar Ventana Flotante, centerwindow,
bindd = $mainMod, O, Alternar Opacidad, setprop, active opaque toggle
bindd = $mainMod SHIFT, C, Ventana Mini (1200x800), exec, sh -c "hyprctl dispatch setfloating && hyprctl dispatch resizeactive exact 1200 800 && hyprctl dispatch centerwindow"

# --- GRUPOS (Modo Browser) ---
# 1. Agrupar/Desagrupar (Toggle)
bindd = $mainMod, G, Agrupar Ventana (Toggle), togglegroup

# 2. Navegación con TAB
bindd = ALT, Tab, Siguiente Pestaña, changegroupactive, f
bindd = ALT SHIFT, Tab, Pestaña Anterior, changegroupactive, b

# 3. Meter ventanas al grupo (Move Into) - Usamos ALT
bind = $mainMod ALT, H, moveintogroup, l
bind = $mainMod ALT, L, moveintogroup, r
bind = $mainMod ALT, K, moveintogroup, u
bind = $mainMod ALT, J, moveintogroup, d

# 4. Sacar ventana del grupo
bind = $mainMod ALT, down, moveoutofgroup

# --- LAYOUTS ---
#bindd = $mainMod, U, Modo Pseudo (Dwindle), pseudo,
#bindd = $mainMod, S, Rotar Orientación (Split), layoutmsg, togglesplit

# --- ESPACIO MÁGICO (Scratchpad) ---
bindd = $mainMod, Z, Ver Espacio Mágico, togglespecialworkspace, magic
bindd = $mainMod SHIFT, Z, Enviar a Espacio Mágico, movetoworkspace, special:magic

# --- EXTRAS ---
bindd = $mainMod SHIFT, S, Screenshot (Región), exec, sh -c "hyprshot -m region --freeze --raw | satty --copy-command wl-copy --early-exit --action-on-enter save-to-file --right-click-copy --filename - --output-filename $HOME/Pictures/Screenshots/\$(date '+%Y-%m-%d_%H-%M-%S').png"
bindd = $mainMod, B, Reiniciar Waybar, exec, killall -SIGUSR1 waybar
bindd = $mainMod, A, Traer al Frente, exec, hyprctl dispatch bringactivetotop

# =======================================================
#  ZONA DE MOVIMIENTO (Sin descripciones explícitas)
# =======================================================

# --- FOCO (Navegación entre ventanas) ---
bind = $mainMod, Tab, cyclenext
bind = $mainMod SHIFT, Tab, cyclenext, prev
bind = $mainMod, Escape, focuscurrentorlast

# Flechas
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
# Vim (HJKL)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# --- MOVER VENTANAS (Swap) ---
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# --- MOVIMIENTO FINO (Flotantes) ---
# Usamos CTRL para mover pixel a pixel
binde = $mainMod CTRL, left, moveactive, -50 0
binde = $mainMod CTRL, right, moveactive, 50 0
binde = $mainMod CTRL, up, moveactive, 0 -50
binde = $mainMod CTRL, down, moveactive, 0 50
binde = $mainMod CTRL, h, moveactive, -50 0
binde = $mainMod CTRL, l, moveactive, 50 0
binde = $mainMod CTRL, k, moveactive, 0 -50
binde = $mainMod CTRL, j, moveactive, 0 50

# --- REDIMENSIONAR (Resize Submap) ---
bind = $mainMod, R, submap, resize
submap = resize
binde = , right, resizeactive, 10 0
binde = , left, resizeactive, -10 0
binde = , up, resizeactive, 0 -10
binde = , down, resizeactive, 0 10
binde = , h, resizeactive, -10 0
binde = , l, resizeactive, 10 0
binde = , k, resizeactive, 0 -10
binde = , j, resizeactive, 0 10
bind = , escape, submap, reset
submap = reset

# --- WORKSPACES ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


# --- MEDIA & HARDWARE ---
# Volumen
binded = , XF86AudioRaiseVolume, Subir Volumen, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
binded = , XF86AudioLowerVolume, Bajar Volumen, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
binded = , XF86AudioMute, Mutear Audio, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
binded = , XF86AudioMicMute, Mutear Micrófono, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
binded = , XF86MonBrightnessUp, Subir Brillo, exec, brightnessctl s 10%+
binded = , XF86MonBrightnessDown, Bajar Brillo, exec, brightnessctl s 10%-

# Reproducción
bindld = , XF86AudioNext, Siguiente Pista, exec, playerctl next
bindld = , XF86AudioPause, Pausar Pista, exec, playerctl play-pause
bindld = , XF86AudioPlay, Reproducir Pista, exec, playerctl play-pause
bindld = , XF86AudioPrev, Pista Anterior, exec, playerctl previous

# --- CONTROL DE MÚSICA (Alternativa para el MX Keys) ---
bindld = $mainMod, period, Siguiente Pista (Teclado), exec, playerctl next
bindld = $mainMod, comma, Pista Anterior (Teclado), exec, playerctl previous

# Adelantar / Retrasar la pista actual (Seek de 10 segundos)
bindld = $mainMod SHIFT, period, Adelantar 10s, exec, playerctl position 10+
bindld = $mainMod SHIFT, comma, Retrasar 10s, exec, playerctl position 10-


# --- ZOOM ---
# Aumentar zoom del cursor (0.5 teclado, 0.1 mouse/trackpad)
binde = $mainMod SHIFT, I, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') + 0.5}")
binde = $mainMod SHIFT, mouse_down, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') + 0.1}")

binde = $mainMod SHIFT, O, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {v=$(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') - 0.5; print (v < 1) ? 1 : v}")
binde = $mainMod SHIFT, mouse_up, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {v=$(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') - 0.1; print (v < 1) ? 1 : v}")


# --- MASTER LAYOUT ---
bindd = $mainMod, Return, Hacer Master, layoutmsg, swapwithmaster master
bind = , mouse:277, layoutmsg, swapwithmaster master
bindd = $mainMod, S, Foco al Master, layoutmsg, focusmaster auto
bindd = $mainMod, U, Rotar Master, layoutmsg, orientationnext
bindd = $mainMod, Y, Sumar a Master, layoutmsg, addmaster
bindd = $mainMod SHIFT, Y, Restar de Master, layoutmsg, removemaster

# --- GESTIÓN DE SESIONES Y LAYOUTS ---
bindd = $mainMod, M, Guardar y Salir, exec, ~/.local/bin/session-manager/save.sh logout
bindd = $mainMod, W, Guardar Plantilla, exec, ~/.local/bin/session-manager/save.sh custom
bindd = $mainMod SHIFT, W, Cargar Entorno, exec, ~/.local/bin/session-manager/load.sh
bindd = $mainMod SHIFT, M, Salida Forzada, exit,
