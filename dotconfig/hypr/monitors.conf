################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Configuración de monitores en orden de izquierda a derecha:
# $AOC -> $NZXT -> $ASUS -> $THINKPAD

source = ~/.config/hypr/monitors_ids.conf

monitor=$AOC, 1920x1080@60.0, 0x0, 1.0
monitor=$NZXT, 2560x1440@120.0, 1920x0, 1.0
monitor=$ASUS, 1920x1080@60.0, 4480x0, 1.0
monitor=$THINKPAD, 1920x1080@60.0, 6400x0, 1.0

workspace = 1, monitor:$NZXT
workspace = 2, monitor:$NZXT

workspace = 3, monitor:$AOC
workspace = 6, monitor:$AOC

workspace = 4, monitor:$ASUS
workspace = 8, monitor:$ASUS

workspace = 5, monitor:$THINKPAD
workspace = 7, monitor:$THINKPAD
