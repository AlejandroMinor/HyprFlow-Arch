# wallust template -> ~/.config/hypr/hyprlock-theme.conf
# Regenerated on every wallpaper change so hyprlock tracks the current palette.
# The wallpaper path is resolved by geometry.sh instead; wallust exposes no
# wallpaper variable in this version.
#
# ASCII only. Accented characters desync wallust's template parser and it
# fails with "Missing variable".
$bg        = rgb({color0.strip})
$surface   = rgba({color0.strip}b8)
$fg        = rgb({color7.strip})
$fg_dim    = rgba({color7.strip}bb)
$accent    = rgb({color3.strip})

# Hairlines and the password field. Derived from the palette rather than fixed
# so the glass bar and input keep tracking the wallpaper like everything else.
$border       = rgba({color7.strip}29)
$input_bg     = rgba({color0.strip}85)
$input_border = rgba({color7.strip}24)

# Not themed: a failed unlock has to read as an error at any wallpaper.
$error        = rgba(d64545ff)
