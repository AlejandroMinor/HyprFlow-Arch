[colors]
palette = "harddark"

[templates]
rofi.template = "colors-rofi.rasi"
rofi.target = "~/.cache/wallust/colors/colors-rofi.rasi"
rofi.pywal = true

rofi-hyprflow.template = "colors-rofi-hyprflow.rasi"
rofi-hyprflow.target = "~/.config/rofi/hyprflow/colors.rasi"
rofi-hyprflow.pywal = true

hyprland.template = "colors-hyprland.lua"
hyprland.target = "~/.config/hypr/colors.lua"
hyprland.pywal = true

waybar.template = "colors-waybar.css"
waybar.target = "~/.cache/wallust/colors/colors-waybar.css"
waybar.pywal = true

colors-rofi-sh.template = "colors-rofi-sh.conf"
colors-rofi-sh.target = "~/.cache/wallust/colors/colors-rofi-sh.conf"
colors-rofi-sh.pywal = true

cava.template = "colors-cava.conf"
cava.target = "~/.config/cava/themes/wallust"
cava.pywal = true

kitty.template = "colors-kitty.conf"
kitty.target = "~/.config/kitty/current-theme.conf"
kitty.pywal = true

wlogout.template = "colors-wlogout.css"
wlogout.target = "~/.config/wlogout/colors.css"
wlogout.pywal = true